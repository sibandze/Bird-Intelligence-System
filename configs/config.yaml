# config.yaml

data:
  raw_audio_dir: "data/raw_audio"
  processed_npy_dir: "data/processed_spectrograms"
  metadata_csv: ""
  data_csv: "data/birds_voices.csv"
  num_classes: 5
  num_samples_per_class: 15

audio:
  sr: 32000
  n_fft: 2048
  hop_length: 512
  n_mels: 128
  segment_size: 187

model:
  embed_dim: 256
  depth: 6
  num_heads: 8

training:
  batch_size: 32
  epochs: 50
  learning_rate: 0.001
  device: "cuda" # or "cpu", "mps"
