data:
  raw_audio_dir: "data/raw_audio"
  processed_npy_dir: "data/processed_spectrograms"
  metadata_dir: "data/metadata"
  data_csv: "data/birds_voices.csv"
  num_classes: 5
  num_samples_per_class: 50

audio:
  sr: 32000
  n_fft: 2048
  hop_length: 512
  n_mels: 128
  segment_seconds: 3
  min_db: -80.0
  max_db: 0.0

model:
  embed_dim: 256
  num_layers: 6
  heads: 8
  patch_size: 25
  forward_expansion: 4
  dropout: 0.1

training:
  batch_size: 32
  epochs: 100
  learning_rate: 0.0001
  device: "cuda" # or "cpu", "mps"
  num_workers: 2
  weight_decay: 0.01
  # === Scheduler Configuration ===
  scheduler_type: "cosine"           # Options: constant, cosine, linear_decay, cosine_warm_restarts, reduce_on_plateau, one_cycle
  warmup_steps: 500                  # Linear warmup steps (0 = no warmup)
  min_lr: 1.0e-6                    # Minimum learning rate for decay schedulers

augmentation:
  enabled: true
  prob: 0.5
  num_freq_masks: 2
  freq_mask_param: 6
  num_time_masks: 2
  time_mask_param: 10
